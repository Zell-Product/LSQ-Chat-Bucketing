<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useRef, useCallback, useEffect } = React;

    // ── Taxonomy (display + colors only) ─────────────────────────────────────
    const TAXONOMY = {
      "Refund": ["Service & Quality Gap", "Sales & Admissions Issue", "Personal & Medical", "Financial & Pricing"],
      "Tech & Platform/LMS": ["Account & Login Access", "Content & Class Visibility", "Validity & Transfers", "Tech Support & Platforms"],
      "Registrations & Exams": ["Registration & Delays", "Exemptions", "Documents & Verification", "Registration Codes & IR"],
      "Operations & Logistics": ["Onboarding Journey", "Books & Dispatch", "Batch Allocation & Timings"],
      "New Leads & Referrals": ["New Lead", "Referral"],
      "Academics & Careers": ["Academic Doubts", "Placements"],
      "Service": ["Faculty Issue", "Mentor Related Query", "General Queries"],
    };

    const CATEGORY_COLORS = {
      "Refund": "#ef4444",
      "Tech & Platform/LMS": "#8b5cf6",
      "Registrations & Exams": "#f59e0b",
      "Operations & Logistics": "#3b82f6",
      "New Leads & Referrals": "#10b981",
      "Academics & Careers": "#06b6d4",
      "Service": "#ec4899",
    };
    const CATEGORY_BG = {
      "Refund": "#fef2f2", "Tech & Platform/LMS": "#f5f3ff",
      "Registrations & Exams": "#fffbeb", "Operations & Logistics": "#eff6ff",
      "New Leads & Referrals": "#f0fdf4", "Academics & Careers": "#ecfeff",
      "Service": "#fdf2f8",
    };

    // ── The full, precise classification prompt ────────────────────────────────
    // This is kept as a constant so it's easy to audit/edit
    const CLASSIFICATION_PROMPT = `You are a QA auditor for an education company's WhatsApp customer support team.

Your task is TWO-FOLD:
1. CATEGORIZE the conversation into the correct Category and Sub-category.
2. SCORE the agent on a 100-point rubric.

━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
PART 1 — CATEGORIZATION
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
Use the EXACT taxonomy below. Match based on the PRIMARY issue in the conversation.

CATEGORY: Refund
  • Sub: Service & Quality Gap      → Student unhappy with services, faculty problem, mentor problem, content issue.
  • Sub: Sales & Admissions Issue   → Misselling, loan issue, registration issue that leads to a refund.
  • Sub: Personal & Medical         → Medical issue, change of mind, personal emergency.
  • Sub: Financial & Pricing        → Financial hardship, double payment, discount disputes, pricing complaint.

CATEGORY: Tech & Platform/LMS
  • Sub: Account & Login Access     → Password reset, suspension/unsuspension, account blocked or unavailable, revoking access.
  • Sub: Content & Class Visibility → Recording not visible, batch recordings access, live batch access issues, pre-learning access.
  • Sub: Validity & Transfers       → Validity issue, course expired, validity freeze, batch change (tech-related).
  • Sub: Tech Support & Platforms   → LMS downtime, mobile app bug, Analyst Prep platform issue, Surgent platform issue.

CATEGORY: Registrations & Exams
  • Sub: Registration & Delays      → Booking exam papers, exam fees payment, exam fee reimbursement, registration delay or error, ACCA/IMA/CFA/FRM registration issues.
  • Sub: Exemptions                 → Exemption claim, exemption not reflecting in portal.
  • Sub: Documents & Verification   → Document submission, document verification.
  • Sub: Registration Codes & IR    → Exam codes issue, code change request, IR (Initial Registration) issue.

CATEGORY: Operations & Logistics
  • Sub: Onboarding Journey         → Schedule onboarding, rescheduling onboarding, missed onboarding, post-onboarding queries, enrollment form.
  • Sub: Books & Dispatch           → Books delivery delay, tracking ID not received, damaged books, books request form, international delivery of books.
  • Sub: Batch Allocation & Timings → Batch timings query, batch not yet allocated, batch change request (non-technical).

CATEGORY: New Leads & Referrals
  • Sub: New Lead                   → Person is enquiring to join a course; no existing enrollment.
  • Sub: Referral                   → Referral program query or referral submission.

CATEGORY: Academics & Careers
  • Sub: Academic Doubts            → Conceptual doubt, mock exam or mock test query, study guidance.
  • Sub: Placements                 → Placement assistance, job query, career support.

CATEGORY: Service
  • Sub: Faculty Issue              → Complaint or query specifically about a faculty member.
  • Sub: Mentor Related Query       → Query about a mentor or mentoring session.
  • Sub: General Queries            → Everything else that does not fit above.

HARD OVERRIDE RULES (apply these FIRST before any other logic):
  RULE 1 — Agent Override: If the Agent Owner field is exactly "Amisha Suthar", "Priyal Bhargava", or "Sehar Sayed", you MUST set Category="Operations & Logistics" AND Subcategory="Onboarding Journey". No exceptions.
  RULE 2 — Mock/Mock Exam keyword: If the chat text contains "mock" or "mock exam" or "mock test", you MUST set Category="Academics & Careers" AND Subcategory="Academic Doubts".
  RULE 3 — Exam Fee / Booking keyword: If the chat is about booking an exam, paying exam fees, or getting exam fee reimbursement, you MUST set Category="Registrations & Exams" AND Subcategory="Registration & Delays".

━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
PART 2 — QA SCORING (Total = 100 points)
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
Score STRICTLY. Do not be lenient. Use only the allowed point values.

[A] RESOLUTION & ACCURACY (40 pts)
  • accuracyScore (20 or 0):
      20 = All information shared (fees, deadlines, codes, course details) is 100% correct. Even one factual error = 0. A score of 0 here is an AUTO-FAIL.
      0  = Any factual inaccuracy found, or cannot be verified.

  • resolutionScore (20, 10, or 0):
      20 = Issue fully resolved AND agent anticipated the student's likely next question before closing ("The +1 Method").
      10 = Issue directly answered, but agent did NOT anticipate follow-up needs.
      0  = Issue only partially addressed or the student would definitely need to follow up again.

[B] EMPATHY & TONE (25 pts)
  • toneScore (15, 7, or 0):
      15 = Warm, empathetic, used student's name naturally, validated feelings, used appropriate emojis (😊, 👍).
      7  = Neutral and professional, but robotic — no personal warmth.
      0  = Cold, dismissive, impatient, or rude in any way.

  • listeningScore (10, 5, or 0):
      10 = Seamlessly picked up on all prior context — no redundant questions.
      5  = Asked student to repeat or clarify a minor detail already mentioned.
      0  = Asked for information the student had already explicitly provided.

[C] PROCESS & EFFICIENCY (20 pts)
  • speedScore (10, 5, or 0):
      Look at the timestamps in the conversation.
      10 = First reply within 1-2 minutes AND subsequent replies within 60 seconds; if student was put on hold, agent communicated wait time.
      5  = Slightly delayed (2-5 minutes initial TAT, or 1-3 min active gaps), or left student on "read" briefly.
      0  = SLA clearly breached — long unexplained silences or student had to chase the agent.

  • crmScore (10, 5, or 0):
      Infer from context clues (e.g., agent says "I've raised a ticket", "I've updated your profile", "I've tagged this").
      10 = Evidence of correct ticket logging and identity verification (if needed).
      5  = Logged or verified, but did it incorrectly or incompletely.
      0  = No evidence of any CRM logging or identity check.

[D] COMMUNICATION (15 pts)
  • formattingScore (5, 2, or 0):
      5 = Messages are chunked into short, readable bursts; uses *bold* for key terms, or bullet points for steps; easy to read on mobile.
      2 = Mostly readable but slightly cluttered.
      0 = Single massive wall of text that is hard to read on a mobile screen.

  • grammarScore (5, 2, or 0):
      5 = Professional language throughout; no slang, no abbreviations like "pls", "u", "thx", "hie", "k".
      2 = Minor typos but overall readable and professional.
      0 = Heavy spelling errors, unprofessional text-speak, or slang that undermines credibility.

  • closingScore (5 or 0):
      5 = Agent explicitly confirmed the issue was resolved and used a proper sign-off (e.g., "Is there anything else I can help you with?").
      0 = Chat ended abruptly, agent ghosted, or no resolution confirmation was given.

━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
PART 3 — FEEDBACK & FLAG
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  • qaFeedback: Write 1-2 specific, actionable sentences for the agent. Reference exact moments from the chat. Be constructive but honest.
  • flagged (true/false): Set to TRUE if ANY of these apply: accuracyScore=0, toneScore=0, speedScore=0, crmScore=0, totalScore < 40, or any deeply concerning behaviour.
  • flagReason: If flagged=true, give a short 3-6 word reason (e.g., "Auto-Fail: Incorrect fee info", "Rude tone detected", "SLA severely breached"). Empty string if not flagged.

━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
CONVERSATION TO ANALYSE
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
Student Name: {{STUDENT_NAME}}
Lead Stage: {{LEAD_STAGE}}
Agent Owner: {{AGENT_OWNER}}

Chat Transcript:
{{TRANSCRIPT}}`;

    // ── Helpers ───────────────────────────────────────────────────────────────
    function parseCSV(file) {
      return new Promise((resolve, reject) => {
        if (window.Papa) {
          window.Papa.parse(file, { header: true, skipEmptyLines: true, complete: (r) => resolve(r.data), error: reject });
        } else {
          const script = document.createElement("script");
          script.src = "https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js";
          script.onload = () => window.Papa.parse(file, { header: true, skipEmptyLines: true, complete: (r) => resolve(r.data), error: reject });
          script.onerror = () => reject(new Error("Failed to load CSV parser."));
          document.head.appendChild(script);
        }
      });
    }

    function buildConversations(rows) {
      const map = {};
      rows.forEach((row) => {
        const pid = row["Prospect Id"] || row["prospect_id"] || "unknown";
        if (!map[pid]) {
          map[pid] = {
            prospectId: pid,
            studentId: row["Student ID"] || row["student_id"] || "",
            name: row["Lead Name"] || row["First Name"] || "Unknown",
            email: row["Email Address"] || "",
            phone: row["Phone Number"] || "",
            leadStage: row["Lead Stage"] || row["BD Lead Stage"] || "",
            currentBatch: row["Current Batch"] || "",
            owner: row["Owner (User Name)"] || row["Owner"] || "",
            messages: [],
          };
        }
        const note = (row["Notes"] || "").trim();
        if (note && note.length > 2) {
          map[pid].messages.push({
            date: row["Activity Date"] || "",
            direction: row["Direction"] || "unknown",
            note,
          });
        }
      });
      return Object.values(map)
        .map((c) => ({ ...c, messages: c.messages.sort((a, b) => new Date(a.date) - new Date(b.date)) }))
        .filter((c) => c.messages.length > 0);
    }

    function conversationToText(conv) {
      return conv.messages
        .slice(0, 35)
        .map((m) => `[${m.direction} | ${m.date}] ${m.note.slice(0, 500)}`)
        .join("\n");
    }

    async function classifyConversation(conv, apiKey, attempt = 0) {
      const delays = [1500, 3000, 6000, 12000, 24000];
      const transcript = conversationToText(conv);

      const filledPrompt = CLASSIFICATION_PROMPT
        .replace("{{STUDENT_NAME}}", conv.name)
        .replace("{{LEAD_STAGE}}", conv.leadStage || "N/A")
        .replace("{{AGENT_OWNER}}", conv.owner || "Unknown")
        .replace("{{TRANSCRIPT}}", transcript);

      const payload = {
        contents: [{ parts: [{ text: filledPrompt }] }],
        generationConfig: {
          responseMimeType: "application/json",
          responseSchema: {
            type: "OBJECT",
            properties: {
              category:      { type: "STRING" },
              subcategory:   { type: "STRING" },
              summary:       { type: "STRING", description: "1 concise sentence describing the student's primary issue" },
              sentiment:     { type: "STRING", enum: ["Positive", "Neutral", "Negative"] },
              scores: {
                type: "OBJECT",
                properties: {
                  accuracyScore:    { type: "INTEGER", description: "20 or 0 only" },
                  resolutionScore:  { type: "INTEGER", description: "20, 10, or 0 only" },
                  toneScore:        { type: "INTEGER", description: "15, 7, or 0 only" },
                  listeningScore:   { type: "INTEGER", description: "10, 5, or 0 only" },
                  speedScore:       { type: "INTEGER", description: "10, 5, or 0 only" },
                  crmScore:         { type: "INTEGER", description: "10, 5, or 0 only" },
                  formattingScore:  { type: "INTEGER", description: "5, 2, or 0 only" },
                  grammarScore:     { type: "INTEGER", description: "5, 2, or 0 only" },
                  closingScore:     { type: "INTEGER", description: "5 or 0 only" },
                },
                required: ["accuracyScore","resolutionScore","toneScore","listeningScore","speedScore","crmScore","formattingScore","grammarScore","closingScore"]
              },
              totalScore:  { type: "INTEGER", description: "Sum of all nine scores. Max 100." },
              qaFeedback:  { type: "STRING", description: "1-2 specific, actionable sentences for the agent referencing exact moments in the chat." },
              flagged:     { type: "BOOLEAN" },
              flagReason:  { type: "STRING", description: "Short 3-6 word reason if flagged, else empty string." },
            },
            required: ["category","subcategory","summary","sentiment","scores","totalScore","qaFeedback","flagged","flagReason"]
          }
        }
      };

      try {
        const resp = await fetch(
          `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-05-20:generateContent?key=${apiKey}`,
          { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) }
        );
        if (!resp.ok) {
          const err = await resp.json().catch(() => ({}));
          throw new Error(`HTTP ${resp.status}: ${err?.error?.message || "Invalid Key or quota exceeded"}`);
        }
        const data = await resp.json();
        const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
        if (!text) throw new Error("Empty model response");
        return JSON.parse(text);
      } catch (err) {
        const isKeyError = err.message.includes("400") || err.message.includes("403") || err.message.includes("Invalid");
        if (attempt < delays.length && !isKeyError) {
          await new Promise(r => setTimeout(r, delays[attempt]));
          return classifyConversation(conv, apiKey, attempt + 1);
        }
        return {
          category: "Service", subcategory: "General Queries",
          summary: "Classification failed: " + err.message, sentiment: "Neutral",
          scores: { accuracyScore:0, resolutionScore:0, toneScore:0, listeningScore:0, speedScore:0, crmScore:0, formattingScore:0, grammarScore:0, closingScore:0 },
          totalScore: 0, qaFeedback: "Failed to process. Check API key or rate limits.", flagged: true, flagReason: "API Error"
        };
      }
    }

    // ── Mini Components ───────────────────────────────────────────────────────
    function MiniBar({ data, total }) {
      return (
        <div className="flex flex-col gap-2">
          {Object.entries(data).sort(([,a],[,b]) => b-a).map(([cat, count]) => (
            <div key={cat} className="flex items-center gap-2">
              <div className="w-36 text-[11px] text-slate-500 text-right shrink-0 truncate" title={cat}>{cat}</div>
              <div className="flex-1 bg-slate-100 rounded h-4 overflow-hidden">
                <div style={{ width:`${(count/total)*100}%`, background: CATEGORY_COLORS[cat]||"#94a3b8" }}
                  className="h-full rounded transition-all duration-700 flex items-center justify-end pr-1.5">
                  {count > 0 && <span className="text-[9px] text-white font-bold">{count}</span>}
                </div>
              </div>
              <div className="w-8 text-[11px] text-slate-400 text-right">{Math.round((count/total)*100)}%</div>
            </div>
          ))}
        </div>
      );
    }

    function DonutChart({ data, total }) {
      const cats = Object.entries(data).sort(([,a],[,b]) => b-a);
      let cum = 0;
      const r=60, cx=70, cy=70, sw=22, circ=2*Math.PI*r;
      const slices = cats.map(([cat,count]) => {
        const pct = count/total;
        const offset = circ*(1-cum-pct); cum+=pct;
        return { cat, dasharray:`${circ*pct} ${circ*(1-pct)}`, offset };
      });
      return (
        <svg viewBox="0 0 140 140" width={140} height={140}>
          <circle cx={cx} cy={cy} r={r} fill="none" stroke="#f1f5f9" strokeWidth={sw}/>
          {slices.map(({cat,dasharray,offset}) => (
            <circle key={cat} cx={cx} cy={cy} r={r} fill="none"
              stroke={CATEGORY_COLORS[cat]||"#94a3b8"} strokeWidth={sw}
              strokeDasharray={dasharray} strokeDashoffset={offset}
              style={{transition:"all 0.7s ease",transform:"rotate(-90deg)",transformOrigin:"50% 50%"}}/>
          ))}
          <text x={cx} y={cy-4} textAnchor="middle" fontSize={22} fontWeight={800} fill="#1e293b">{total}</text>
          <text x={cx} y={cy+12} textAnchor="middle" fontSize={10} fill="#94a3b8">chats</text>
        </svg>
      );
    }

    function SentimentBadge({ s }) {
      const cfg = { Positive:["#10b981","#f0fdf4","😊"], Neutral:["#f59e0b","#fffbeb","😐"], Negative:["#ef4444","#fef2f2","😞"] };
      const [color,bg,emoji] = cfg[s]||cfg.Neutral;
      return (
        <span style={{background:bg,color,border:`1px solid ${color}33`}}
          className="text-[10px] font-bold px-2 py-0.5 rounded-full whitespace-nowrap">
          {emoji} {s}
        </span>
      );
    }

    function ScoreBar({ value, max }) {
      const pct = max > 0 ? (value/max)*100 : 0;
      const color = pct===100?"#10b981":pct>=50?"#f59e0b":"#ef4444";
      return (
        <div className="flex items-center gap-2">
          <div className="flex-1 bg-slate-700 rounded-full h-1.5 overflow-hidden">
            <div style={{width:`${pct}%`,background:color}} className="h-full rounded-full transition-all duration-500"/>
          </div>
          <span style={{color}} className="text-[10px] font-bold font-mono w-10 text-right">{value}/{max}</span>
        </div>
      );
    }

    // ── Main App ──────────────────────────────────────────────────────────────
    function App() {
      const [apiKey, setApiKey] = useState("");
      const [tempKey, setTempKey] = useState("");
      const [showSettings, setShowSettings] = useState(false);
      const [stage, setStage] = useState("upload");
      const [results, setResults] = useState([]);
      const [progress, setProgress] = useState(0);
      const [total, setTotal] = useState(0);
      const [search, setSearch] = useState("");
      const [filterCat, setFilterCat] = useState("All");
      const [filterSent, setFilterSent] = useState("All");
      const [filterFlag, setFilterFlag] = useState("All");
      const [expanded, setExpanded] = useState(null);
      const [error, setError] = useState("");
      const fileRef = useRef();
      const abortRef = useRef(false);

      useEffect(() => {
        const k = localStorage.getItem("gemini_qa_key_v2");
        if (k) setApiKey(k); else setShowSettings(true);
      }, []);

      const saveKey = () => {
        if (tempKey.trim()) {
          localStorage.setItem("gemini_qa_key_v2", tempKey.trim());
          setApiKey(tempKey.trim()); setShowSettings(false); setTempKey("");
        }
      };

      const handleFiles = useCallback(async (files) => {
        if (!apiKey) { setShowSettings(true); return; }
        setError("");
        try {
          let allRows = [];
          for (const f of files) allRows = allRows.concat(await parseCSV(f));
          const convos = buildConversations(allRows);
          if (!convos.length) { setError("No valid conversations found. Check that CSV has 'Prospect Id' and 'Notes' columns."); return; }
          setTotal(convos.length); setResults([]); setProgress(0);
          setStage("processing"); abortRef.current = false;
          const out = [];
          for (let i = 0; i < convos.length; i++) {
            if (abortRef.current) break;
            const res = await classifyConversation(convos[i], apiKey);
            out.push({ ...convos[i], ...res });
            setProgress(i+1); setResults([...out]);
            if (i < convos.length-1) await new Promise(r => setTimeout(r, 500));
          }
          if (!abortRef.current) setStage("done");
        } catch(e) { setError("Parse error: " + e.message); setStage("upload"); }
      }, [apiKey]);

      const onDrop = useCallback((e) => {
        e.preventDefault();
        handleFiles([...e.dataTransfer.files].filter(f => f.name.endsWith(".csv")));
      }, [handleFiles]);

      const exportCSV = () => {
        const H = ["Prospect Id","Student ID","Name","Email","Phone","Owner","Lead Stage","Current Batch",
          "Category","Subcategory","Sentiment","Summary","Message Count",
          "QA Score","Flagged","Flag Reason","QA Feedback",
          "Accuracy(20)","Resolution(20)","Tone(15)","Listening(10)",
          "Speed(10)","CRM(10)","Formatting(5)","Grammar(5)","Closing(5)"];
        const rows = results.map(r => {
          const s = r.scores||{};
          return [r.prospectId,r.studentId,r.name,r.email,r.phone,r.owner,r.leadStage,r.currentBatch,
            r.category,r.subcategory,r.sentiment,`"${(r.summary||"").replace(/"/g,"'")}"`,r.messages.length,
            r.totalScore||0,r.flagged?"Yes":"No",r.flagReason||"",`"${(r.qaFeedback||"").replace(/"/g,"'")}"`,
            s.accuracyScore||0,s.resolutionScore||0,s.toneScore||0,s.listeningScore||0,
            s.speedScore||0,s.crmScore||0,s.formattingScore||0,s.grammarScore||0,s.closingScore||0];
        });
        const csv = [H,...rows].map(r=>r.join(",")).join("\n");
        const a = document.createElement("a");
        a.href = URL.createObjectURL(new Blob([csv],{type:"text/csv"}));
        a.download = "whatsapp_qa_results.csv"; a.click();
      };

      const catCounts = results.reduce((a,r)=>({...a,[r.category]:(a[r.category]||0)+1}),{});
      const sentCounts = results.reduce((a,r)=>({...a,[r.sentiment]:(a[r.sentiment]||0)+1}),{});
      const flaggedCount = results.filter(r=>r.flagged).length;
      const avgScore = results.length ? Math.round(results.reduce((a,r)=>a+(r.totalScore||0),0)/results.length) : 0;

      const filtered = results.filter(r => {
        const s = search.toLowerCase();
        return (!s || [r.name,r.studentId,r.summary,r.category,r.owner].some(v=>(v||"").toLowerCase().includes(s)))
          && (filterCat==="All" || r.category===filterCat)
          && (filterSent==="All" || r.sentiment===filterSent)
          && (filterFlag==="All" || (filterFlag==="Flagged"?r.flagged:!r.flagged));
      });

      const scoreGroups = [
        { label:"Resolution & Accuracy", color:"#ef4444", items:[
          {k:"Accuracy of Information",   key:"accuracyScore",   max:20, note:"20 or 0 — Auto-Fail if 0"},
          {k:"Completeness + '+1 Method'",key:"resolutionScore", max:20, note:"20 / 10 / 0"},
        ]},
        { label:"Empathy & Tone", color:"#ec4899", items:[
          {k:"Tone & Warmth",  key:"toneScore",      max:15, note:"15 / 7 / 0"},
          {k:"Active Listening",key:"listeningScore", max:10, note:"10 / 5 / 0"},
        ]},
        { label:"Process & Efficiency", color:"#3b82f6", items:[
          {k:"Response Speed (TAT)",key:"speedScore", max:10, note:"10 / 5 / 0"},
          {k:"CRM & Authentication", key:"crmScore",  max:10, note:"10 / 5 / 0"},
        ]},
        { label:"Communication", color:"#f59e0b", items:[
          {k:"Clarity & Formatting",key:"formattingScore", max:5, note:"5 / 2 / 0"},
          {k:"Spelling & Grammar",  key:"grammarScore",    max:5, note:"5 / 2 / 0"},
          {k:"Professional Closing",key:"closingScore",    max:5, note:"5 or 0"},
        ]},
      ];

      return (
        <div className="min-h-screen bg-slate-50 text-slate-800 font-sans">

          {/* Settings Modal */}
          {showSettings && (
            <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4 backdrop-blur-sm">
              <div className="bg-white rounded-2xl shadow-2xl max-w-sm w-full p-7">
                <div className="text-4xl mb-3 text-center">🔑</div>
                <h2 className="text-xl font-bold text-center mb-1">Gemini API Key</h2>
                <p className="text-sm text-slate-500 text-center mb-6">Saved locally in your browser. Never sent anywhere else.</p>
                <input type="password" value={tempKey} onChange={e=>setTempKey(e.target.value)}
                  onKeyDown={e=>e.key==="Enter"&&saveKey()}
                  placeholder="AIzaSy..."
                  className="w-full px-4 py-2.5 border border-slate-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-400 outline-none mb-4"/>
                <div className="flex gap-2 justify-end">
                  {apiKey && <button onClick={()=>setShowSettings(false)} className="px-4 py-2 text-sm text-slate-600 hover:bg-slate-100 rounded-lg">Cancel</button>}
                  <button onClick={saveKey} disabled={!tempKey.trim()}
                    className="px-6 py-2 bg-blue-600 hover:bg-blue-700 disabled:opacity-40 text-white text-sm font-semibold rounded-lg">
                    Save & Continue
                  </button>
                </div>
                <p className="text-center text-xs text-slate-400 mt-4">
                  Get a free key → <a href="https://aistudio.google.com/app/apikey" target="_blank" className="text-blue-500 hover:underline">aistudio.google.com</a>
                </p>
              </div>
            </div>
          )}

          {/* Header */}
          <header className="bg-slate-900 px-6 py-3.5 flex items-center justify-between sticky top-0 z-10 shadow-lg">
            <div className="flex items-center gap-3">
              <div className="w-9 h-9 bg-emerald-500 rounded-lg flex items-center justify-center text-xl">💬</div>
              <div>
                <h1 className="text-white font-bold text-sm tracking-tight">WhatsApp Chat QA Auditor</h1>
                <p className="text-slate-400 text-[10px] tracking-wide">Powered by Gemini AI · Zell Education</p>
              </div>
            </div>
            <div className="flex items-center gap-2">
              <button onClick={()=>setShowSettings(true)} title="API Key" className="text-slate-400 hover:text-white bg-slate-800 rounded-md p-2 text-sm">⚙️</button>
              {stage==="done" && <button onClick={exportCSV} className="flex items-center gap-1.5 bg-white text-slate-900 hover:bg-slate-100 rounded-md px-3 py-2 text-xs font-semibold ml-2">⬇ Export CSV</button>}
              {stage!=="upload" && <button onClick={()=>{abortRef.current=true;setStage("upload");setResults([]);setProgress(0);}} className="text-slate-300 hover:text-white bg-slate-800 rounded-md px-3 py-2 text-xs font-semibold ml-1">↩ Reset</button>}
            </div>
          </header>

          <main className="p-6 max-w-7xl mx-auto">

            {/* UPLOAD */}
            {stage==="upload" && (
              <div>
                <p className="text-center text-slate-500 text-sm mb-2">Upload your raw WhatsApp chat exports (CSV from LSQ)</p>
                <div onDragOver={e=>e.preventDefault()} onDrop={onDrop} onClick={()=>fileRef.current.click()}
                  className="border-2 border-dashed border-slate-300 rounded-2xl p-16 text-center cursor-pointer bg-white hover:bg-slate-50 hover:border-blue-400 transition-all max-w-lg mx-auto my-8 shadow-sm group">
                  <div className="text-5xl mb-3 group-hover:scale-110 transition-transform">📂</div>
                  <div className="font-bold text-slate-800 text-lg mb-1">Drop CSV files here</div>
                  <div className="text-sm text-slate-400">or click to browse · Supports multiple files</div>
                  <input ref={fileRef} type="file" accept=".csv" multiple hidden onChange={e=>handleFiles([...e.target.files])}/>
                </div>
                {error && <div className="max-w-lg mx-auto p-3 bg-red-50 border border-red-200 text-red-600 rounded-lg text-sm text-center">{error}</div>}
                {/* Taxonomy preview */}
                <div className="max-w-5xl mx-auto mt-8">
                  <div className="text-xs font-bold text-slate-400 tracking-widest uppercase text-center mb-4">Classification Taxonomy</div>
                  <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
                    {Object.entries(TAXONOMY).map(([cat,subs])=>(
                      <div key={cat} style={{borderLeft:`3px solid ${CATEGORY_COLORS[cat]}`}} className="bg-white rounded-lg p-3 shadow-sm">
                        <div style={{color:CATEGORY_COLORS[cat]}} className="font-bold text-xs mb-2">{cat}</div>
                        {subs.map(s=><div key={s} className="text-[11px] text-slate-500 mb-0.5">· {s}</div>)}
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}

            {/* PROCESSING */}
            {stage==="processing" && (
              <div className="max-w-xl mx-auto mt-16 text-center">
                <div className="text-5xl mb-4">✨</div>
                <h2 className="text-xl font-bold mb-1">Auditing Conversations...</h2>
                <p className="text-sm text-slate-500 mb-8">Gemini is classifying, scoring each conversation and generating feedback.</p>
                <div className="bg-slate-200 rounded-full h-2 mb-2 overflow-hidden">
                  <div className="h-full rounded-full transition-all duration-300"
                    style={{width:`${total?(progress/total)*100:0}%`,background:"linear-gradient(90deg,#3b82f6,#8b5cf6)"}}/>
                </div>
                <div className="flex justify-between text-xs text-slate-500 px-1 mb-10">
                  <span>{Math.round((progress/total)*100||0)}%</span>
                  <span>{progress} / {total}</span>
                </div>
                {results.slice(-4).reverse().map((r,i)=>(
                  <div key={i} className="bg-white rounded-lg shadow-sm border border-slate-100 p-3 mb-2 flex items-center gap-3 text-left">
                    <div className={`text-sm font-black w-10 text-center ${r.totalScore>=80?"text-emerald-600":r.totalScore>=60?"text-orange-500":"text-red-600"}`}>{r.totalScore||0}</div>
                    <span style={{background:CATEGORY_BG[r.category]||"#f1f5f9",color:CATEGORY_COLORS[r.category]||"#64748b",border:`1px solid ${(CATEGORY_COLORS[r.category]||"#94a3b8")}33`}}
                      className="text-[10px] font-bold px-2 py-0.5 rounded-full whitespace-nowrap">{r.category}</span>
                    <span className="text-xs text-slate-700 flex-1 truncate font-medium">{r.name}</span>
                    <span className="text-[10px] bg-slate-100 text-slate-500 px-2 py-0.5 rounded-full">{r.subcategory}</span>
                  </div>
                ))}
              </div>
            )}

            {/* DASHBOARD */}
            {stage==="done" && (
              <div>
                {/* KPIs */}
                <div className="grid grid-cols-2 md:grid-cols-5 gap-4 mb-6">
                  {[
                    {label:"Total Audited",  value:results.length,    icon:"💬", border:"border-slate-200"},
                    {label:"Avg QA Score",   value:`${avgScore}/100`, icon:"🎯", border:"border-purple-400", vc:avgScore>=80?"text-purple-600":"text-orange-500"},
                    {label:"Negative Chats", value:sentCounts.Negative||0, icon:"😞", border:"border-red-300", vc:"text-red-500"},
                    {label:"Flagged Chats",  value:flaggedCount,      icon:"🚩", border:"border-rose-500", vc:"text-rose-600"},
                    {label:"Categories",     value:Object.keys(catCounts).length, icon:"🗂️", border:"border-blue-300"},
                  ].map(s=>(
                    <div key={s.label} className={`bg-white rounded-xl p-5 shadow-sm border-b-4 ${s.border}`}>
                      <div className="text-2xl mb-1">{s.icon}</div>
                      <div className={`text-3xl font-extrabold ${s.vc||"text-slate-800"}`}>{s.value}</div>
                      <div className="text-xs text-slate-400 mt-1">{s.label}</div>
                    </div>
                  ))}
                </div>

                {/* Charts */}
                <div className="grid grid-cols-1 md:grid-cols-3 gap-5 mb-5">
                  <div className="bg-white rounded-xl shadow-sm border border-slate-100 p-5 flex flex-col items-center">
                    <div className="text-xs font-bold text-slate-400 tracking-wider mb-3 self-start">BREAKDOWN</div>
                    <DonutChart data={catCounts} total={results.length}/>
                    <div className="mt-3 w-full space-y-1">
                      {Object.entries(catCounts).sort(([,a],[,b])=>b-a).map(([cat,cnt])=>(
                        <div key={cat} className="flex items-center gap-2">
                          <div style={{background:CATEGORY_COLORS[cat]}} className="w-2.5 h-2.5 rounded-sm shrink-0"/>
                          <div className="text-[10px] text-slate-500 flex-1 truncate">{cat}</div>
                          <div className="text-[10px] font-bold text-slate-700">{cnt}</div>
                        </div>
                      ))}
                    </div>
                  </div>
                  <div className="bg-white rounded-xl shadow-sm border border-slate-100 p-5 md:col-span-2">
                    <div className="text-xs font-bold text-slate-400 tracking-wider mb-4">DISTRIBUTION BY CATEGORY</div>
                    <MiniBar data={catCounts} total={results.length}/>
                  </div>
                </div>

                {/* Filters */}
                <div className="flex flex-wrap gap-2 mb-3 items-center bg-white p-2 border border-slate-200 rounded-lg shadow-sm">
                  <div className="relative flex-1 min-w-[180px]">
                    <span className="absolute left-2.5 top-2.5 text-slate-400 text-xs">🔍</span>
                    <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search name, ID, summary..."
                      className="w-full pl-8 pr-3 py-2 bg-slate-50 rounded-md text-sm border border-transparent focus:border-blue-400 focus:bg-white outline-none transition-all"/>
                  </div>
                  {[
                    {val:filterCat, set:setFilterCat, opts:["All Categories",...Object.keys(TAXONOMY)]},
                    {val:filterSent,set:setFilterSent,opts:["All Sentiments","Positive","Neutral","Negative"]},
                    {val:filterFlag,set:setFilterFlag,opts:["All","Flagged","Clean"]},
                  ].map((f,i)=>(
                    <select key={i} value={f.val} onChange={e=>f.set(e.target.value)}
                      className="py-2 px-3 bg-slate-50 border border-slate-200 rounded-md text-sm outline-none focus:border-blue-400 cursor-pointer">
                      {f.opts.map(o=><option key={o}>{o}</option>)}
                    </select>
                  ))}
                  <span className="text-xs text-slate-400 px-2">{filtered.length} of {results.length}</span>
                </div>

                {/* Table */}
                <div className="bg-white border border-slate-200 rounded-xl shadow-sm overflow-hidden">
                  <div className="grid grid-cols-12 gap-3 px-5 py-3 bg-slate-50 border-b border-slate-200 text-[10px] font-bold text-slate-500 uppercase tracking-wider">
                    <div className="col-span-3">Student</div>
                    <div className="col-span-3">Issue Summary</div>
                    <div className="col-span-2">Category</div>
                    <div className="col-span-2">Sub-category</div>
                    <div className="col-span-1 text-center">Feel</div>
                    <div className="col-span-1 text-center">QA Score</div>
                  </div>

                  {filtered.length===0 ? (
                    <div className="p-12 text-center text-slate-400 text-sm">No conversations match your filters.</div>
                  ) : (
                    <div className="divide-y divide-slate-100 max-h-[600px] overflow-y-auto">
                      {filtered.map((r,i)=>(
                        <div key={r.prospectId+i}>
                          <div onClick={()=>setExpanded(expanded===i?null:i)}
                            className={`grid grid-cols-12 gap-3 px-5 py-3.5 items-center cursor-pointer transition-colors ${r.flagged&&expanded!==i?"bg-red-50/40":i%2===0?"bg-white":"bg-slate-50/50"} hover:bg-blue-50/50`}>
                            <div className="col-span-3">
                              <div className="font-semibold text-sm text-slate-800 truncate">{r.name}</div>
                              <div className="text-[10px] text-slate-400 mt-0.5">
                                {r.studentId&&<span className="text-slate-500">#{r.studentId} · </span>}
                                {r.owner&&<span className="text-indigo-500 font-medium">@{r.owner} · </span>}
                                {r.messages.length} msgs
                              </div>
                            </div>
                            <div className="col-span-3 text-xs text-slate-600 leading-snug">{r.summary}</div>
                            <div className="col-span-2">
                              <span style={{background:CATEGORY_BG[r.category]||"#f1f5f9",color:CATEGORY_COLORS[r.category]||"#64748b",border:`1px solid ${(CATEGORY_COLORS[r.category]||"#94a3b8")}33`}}
                                className="text-[10px] font-bold px-2.5 py-1 rounded-full inline-block max-w-full truncate">
                                {r.category}
                              </span>
                            </div>
                            <div className="col-span-2">
                              <span className="text-[10px] bg-slate-100 text-slate-600 px-2 py-1 rounded-md inline-block max-w-full truncate">{r.subcategory}</span>
                            </div>
                            <div className="col-span-1 flex justify-center"><SentimentBadge s={r.sentiment}/></div>
                            <div className="col-span-1 flex items-center justify-center gap-1">
                              <span className={`text-sm font-black ${r.totalScore>=80?"text-emerald-600":r.totalScore>=60?"text-orange-500":"text-red-600"}`}>{r.totalScore||0}</span>
                              {r.flagged && <span title={r.flagReason} className="text-sm cursor-help">🚩</span>}
                            </div>
                          </div>

                          {/* Expanded */}
                          {expanded===i && (
                            <div className="bg-slate-800 px-5 py-5 grid grid-cols-1 lg:grid-cols-5 gap-5">

                              {/* Chat Thread (left 3 cols) */}
                              <div className="lg:col-span-3">
                                <div className="flex justify-between items-center mb-3">
                                  <div className="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Chat Thread</div>
                                  <div className="text-[9px] text-slate-500 font-mono">{r.prospectId}</div>
                                </div>
                                <div className="max-h-[400px] overflow-y-auto pr-1 space-y-3 custom-scrollbar">
                                  {r.messages.map((m,mi)=>(
                                    <div key={mi} className={`flex flex-col max-w-[80%] ${m.direction?.toLowerCase()==="outbound"?"ml-auto items-end":"mr-auto items-start"}`}>
                                      <div className={`p-3 text-xs leading-relaxed rounded-2xl ${m.direction?.toLowerCase()==="outbound"?"bg-blue-600 text-white rounded-tr-sm":"bg-slate-700 text-slate-200 rounded-tl-sm"}`}>
                                        {m.note}
                                      </div>
                                      <div className="text-[9px] text-slate-500 mt-1 px-1 font-medium">
                                        {m.direction} · {new Date(m.date).toLocaleString([],{dateStyle:"short",timeStyle:"short"})}
                                      </div>
                                    </div>
                                  ))}
                                </div>
                              </div>

                              {/* QA Scorecard (right 2 cols) */}
                              <div className="lg:col-span-2 flex flex-col gap-3">
                                <div className="bg-slate-900 rounded-xl p-4 border border-slate-700">
                                  <div className="flex justify-between items-center mb-4 pb-3 border-b border-slate-700">
                                    <div className="text-[10px] font-bold text-slate-400 uppercase tracking-wider">QA Scorecard</div>
                                    <div className={`text-2xl font-black ${r.totalScore>=80?"text-emerald-400":r.totalScore>=60?"text-orange-400":"text-red-400"}`}>
                                      {r.totalScore||0}<span className="text-xs text-slate-500">/100</span>
                                    </div>
                                  </div>
                                  <div className="space-y-4 max-h-[300px] overflow-y-auto custom-scrollbar">
                                    {scoreGroups.map(g=>(
                                      <div key={g.label}>
                                        <div style={{color:g.color}} className="text-[10px] font-bold uppercase tracking-wider mb-2">{g.label}</div>
                                        <div className="space-y-2">
                                          {g.items.map(item=>(
                                            <div key={item.k}>
                                              <div className="flex justify-between text-[10px] mb-0.5">
                                                <span className="text-slate-300">{item.k}</span>
                                                <span className="text-slate-500 italic">{item.note}</span>
                                              </div>
                                              <ScoreBar value={r.scores?.[item.key]||0} max={item.max}/>
                                            </div>
                                          ))}
                                        </div>
                                      </div>
                                    ))}
                                  </div>
                                </div>

                                {/* Feedback / Flag */}
                                <div className={`rounded-xl p-4 border text-xs ${r.flagged?"bg-red-900/30 border-red-700 text-red-200":"bg-slate-900 border-slate-700 text-slate-300"}`}>
                                  {r.flagged && <div className="font-bold text-red-400 not-italic mb-2 flex items-center gap-2 text-[11px]">🚩 FLAGGED: {r.flagReason}</div>}
                                  <div className="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1.5">Agent Feedback</div>
                                  <p className="italic leading-relaxed">"{r.qaFeedback}"</p>
                                </div>
                              </div>

                            </div>
                          )}
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              </div>
            )}
          </main>

          <style dangerouslySetInnerHTML={{__html:`
            .custom-scrollbar::-webkit-scrollbar{width:5px}
            .custom-scrollbar::-webkit-scrollbar-track{background:#0f172a;border-radius:4px}
            .custom-scrollbar::-webkit-scrollbar-thumb{background:#334155;border-radius:4px}
            .custom-scrollbar::-webkit-scrollbar-thumb:hover{background:#475569}
          `}}/>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
