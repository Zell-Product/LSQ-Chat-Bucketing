<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhatsApp Chat Bucketing</title>
  
  <!-- Load Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Load React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Load Babel for in-browser JSX compilation -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <!-- React App Root -->
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useCallback } = React;

    // ── Configuration & Taxonomy ──────────────────────────────────────────────────
    
    // IMPORTANT: When running this locally, you must provide your Gemini API key here!
    const apiKey = ""; 

    const TAXONOMY = {
      "Refund": ["Service & Quality Gap", "Sales & Admissions Issue", "Personal & Medical", "Financial & Pricing"],
      "Tech & Platform/LMS": ["Account & Login Access", "Content & Class Visibility", "Validity & Transfers", "Tech Support & Platforms"],
      "Registrations & Exams": ["Registration & Delays", "Exemptions", "Documents & Verification", "Registration Codes & IR"],
      "Operations & Logistics": ["Onboarding Journey", "Books & Dispatch", "Batch Allocation & Timings"],
      "New Leads & Referrals": ["New Lead", "Referral"],
      "Academics & Careers": ["Academic Doubts", "Placements"],
      "Service": ["Faculty Issue", "Mentor Related Query", "General Queries"],
    };

    const CATEGORY_COLORS = {
      "Refund": "#ef4444",
      "Tech & Platform/LMS": "#8b5cf6",
      "Registrations & Exams": "#f59e0b",
      "Operations & Logistics": "#3b82f6",
      "New Leads & Referrals": "#10b981",
      "Academics & Careers": "#06b6d4",
      "Service": "#ec4899",
    };

    const CATEGORY_BG = {
      "Refund": "#fef2f2",
      "Tech & Platform/LMS": "#f5f3ff",
      "Registrations & Exams": "#fffbeb",
      "Operations & Logistics": "#eff6ff",
      "New Leads & Referrals": "#f0fdf4",
      "Academics & Careers": "#ecfeff",
      "Service": "#fdf2f8",
    };

    // ── Helpers & Data Processing ─────────────────────────────────────────────────

    // Dynamically load PapaParse to ensure it works without npm install
    function parseCSV(file) {
      return new Promise((resolve, reject) => {
        const script = document.createElement("script");
        script.src = "https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js";
        script.onload = () => {
          window.Papa.parse(file, {
            header: true,
            skipEmptyLines: true,
            complete: (r) => resolve(r.data),
            error: reject,
          });
        };
        script.onerror = () => reject(new Error("Failed to load CSV parser."));
        if (window.Papa) {
          script.onload();
        } else {
          document.head.appendChild(script);
        }
      });
    }

    function buildConversations(rows) {
      const map = {};
      rows.forEach((row) => {
        const pid = row["Prospect Id"] || row["prospect_id"] || "unknown";
        if (!map[pid]) {
          map[pid] = {
            prospectId: pid,
            studentId: row["Student ID"] || row["student_id"] || row["Student Id"] || "",
            name: row["Lead Name"] || row["lead_name"] || row["First Name"] || "Unknown",
            email: row["Email Address"] || "",
            phone: row["Phone Number"] || "",
            leadStage: row["Lead Stage"] || row["BD Lead Stage"] || "",
            currentBatch: row["Current Batch"] || "",
            messages: [],
          };
        }
        const note = (row["Notes"] || "").trim();
        if (note && note.length > 2) {
          map[pid].messages.push({
            date: row["Activity Date"] || "",
            direction: row["Direction"] || "unknown",
            note,
          });
        }
      });

      // Sort messages by date, keep only convos with at least 1 human message
      return Object.values(map)
        .map((c) => ({
          ...c,
          messages: c.messages.sort((a, b) => new Date(a.date) - new Date(b.date)),
        }))
        .filter((c) => c.messages.some((m) => !m.note.includes("_auto:") || m.direction.toLowerCase() === "inbound" || m.direction.toLowerCase() === "received"));
    }

    function conversationToText(conv) {
      return conv.messages
        .slice(0, 30) // cap at 30 messages to stay within token limits
        .map((m) => `[${m.direction || "?"} | ${m.date}] ${m.note.slice(0, 400)}`)
        .join("\n");
    }

    async function classifyConversation(conv, attempt = 0) {
      const delays = [1000, 2000, 4000, 8000, 16000]; // Exponential backoff for API limits
      const convoText = conversationToText(conv);
      
      const taxonomyStr = Object.entries(TAXONOMY)
        .map(([cat, subs]) => `${cat}: ${subs.join(", ")}`)
        .join("\n");

      const prompt = `Classify and score this customer support conversation.
Taxonomy:
${taxonomyStr}

Scoring Rubric:
1. Accuracy (20 or 0): Is info 100% correct?
2. Resolution (20, 10, or 0): Solved completely + anticipated next question (20), answered direct but missed unspoken (10), missed parts (0).
3. Tone (15, 7, or 0): Empathetic/warm (15), Neutral (7), Cold/rude (0).
4. Listening (10, 5, or 0): Seamless (10), Asked to repeat minor detail (5), Asked for provided info (0).
5. Speed (10, 5, or 0): Fast/holds managed (10), delayed (5), breached/unacceptable (0). Look at timestamps.
6. CRM/Auth (10, 5, or 0): Verified ID/Logged correctly (10), Logged but wrong/partial (5), Forgot (0). Infer from context.
7. Formatting (5, 2, or 0): Chunked/bold/bullets (5), Cluttered (2), Wall of text (0).
8. Grammar (5, 2, or 0): Professional/no slang (5), minor typos (2), heavy errors/slang (0).
9. Closing (5 or 0): Explicit confirmation/proper sign-off (5), Abrupt/ghosted (0).

Conversation (Student: ${conv.name}, Stage: ${conv.leadStage || "N/A"}):
${convoText}`;

      const payload = {
        contents: [{ parts: [{ text: prompt }] }],
        systemInstruction: { 
          parts: [{ 
            text: "You are an expert QA auditor for an education institute's customer support. Classify the conversation, then score the agent based on the rubric. Calculate the total score." 
          }] 
        },
        generationConfig: {
          responseMimeType: "application/json",
          responseSchema: {
            type: "OBJECT",
            properties: {
              category: { type: "STRING" },
              subcategory: { type: "STRING" },
              summary: { type: "STRING", description: "1 concise sentence summary of the issue" },
              sentiment: { type: "STRING", enum: ["Positive", "Neutral", "Negative"] },
              scores: {
                type: "OBJECT",
                properties: {
                  accuracy: { type: "INTEGER", description: "20 or 0" },
                  resolution: { type: "INTEGER", description: "20, 10, or 0" },
                  tone: { type: "INTEGER", description: "15, 7, or 0" },
                  listening: { type: "INTEGER", description: "10, 5, or 0" },
                  speed: { type: "INTEGER", description: "10, 5, or 0" },
                  crm: { type: "INTEGER", description: "10, 5, or 0" },
                  formatting: { type: "INTEGER", description: "5, 2, or 0" },
                  grammar: { type: "INTEGER", description: "5, 2, or 0" },
                  closing: { type: "INTEGER", description: "5 or 0" }
                }
              },
              totalScore: { type: "INTEGER", description: "Sum of all scores (max 100)" },
              qaFeedback: { type: "STRING", description: "1-2 sentences of specific feedback for the agent" }
            },
            required: ["category", "subcategory", "summary", "sentiment", "scores", "totalScore", "qaFeedback"]
          }
        }
      };

      try {
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });

        if (!response.ok) throw new Error(`HTTP ${response.status}`);

        const data = await response.json();
        const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
        
        if (!text) throw new Error("Empty response");
        
        return JSON.parse(text);
      } catch (err) {
        if (attempt < delays.length) {
          await new Promise(r => setTimeout(r, delays[attempt]));
          return classifyConversation(conv, attempt + 1);
        }
        return { 
          category: "Service", subcategory: "General Queries", summary: "Classification failed: " + err.message, sentiment: "Neutral",
          scores: { accuracy: 0, resolution: 0, tone: 0, listening: 0, speed: 0, crm: 0, formatting: 0, grammar: 0, closing: 0 },
          totalScore: 0, qaFeedback: "Failed to process due to API limits."
        };
      }
    }

    // ── Components ────────────────────────────────────────────────────────────────

    function MiniBar({ data, total }) {
      return (
        <div className="flex flex-col gap-2">
          {Object.entries(data)
            .sort(([, a], [, b]) => b - a)
            .map(([cat, count]) => (
              <div key={cat} className="flex items-center gap-2">
                <div className="w-32 text-[11px] text-slate-500 text-right shrink-0 truncate" title={cat}>{cat}</div>
                <div className="flex-1 bg-slate-100 rounded h-4 overflow-hidden">
                  <div
                    style={{
                      width: `${(count / total) * 100}%`,
                      background: CATEGORY_COLORS[cat] || "#94a3b8",
                    }}
                    className="h-full rounded transition-all duration-700 ease-out flex items-center justify-end pr-1.5"
                  >
                    {count > 0 && <span className="text-[9px] text-white font-bold">{count}</span>}
                  </div>
                </div>
                <div className="w-8 text-[11px] text-slate-400 text-right">{Math.round((count / total) * 100)}%</div>
              </div>
            ))}
        </div>
      );
    }

    function DonutChart({ data, total }) {
      const cats = Object.entries(data).sort(([, a], [, b]) => b - a);
      let cumulative = 0;
      const r = 60, cx = 70, cy = 70, stroke = 22;
      const circumference = 2 * Math.PI * r;
      
      const slices = cats.map(([cat, count]) => {
        const pct = count / total;
        const offset = circumference * (1 - cumulative - pct);
        cumulative += pct;
        return { cat, count, pct, offset, dasharray: `${circumference * pct} ${circumference * (1 - pct)}` };
      });

      return (
        <svg viewBox="0 0 140 140" width={140} height={140}>
          <circle cx={cx} cy={cy} r={r} fill="none" stroke="#f1f5f9" strokeWidth={stroke} />
          {slices.map(({ cat, dasharray, offset }) => (
            <circle
              key={cat}
              cx={cx} cy={cy} r={r}
              fill="none"
              stroke={CATEGORY_COLORS[cat] || "#94a3b8"}
              strokeWidth={stroke}
              strokeDasharray={dasharray}
              strokeDashoffset={offset}
              className="transition-all duration-700 ease-out origin-center -rotate-90"
            />
          ))}
          <text x={cx} y={cy - 4} textAnchor="middle" fontSize={22} fontWeight={800} fill="#1e293b">{total}</text>
          <text x={cx} y={cy + 12} textAnchor="middle" fontSize={10} fill="#94a3b8">chats</text>
        </svg>
      );
    }

    function SentimentBadge({ s }) {
      const cfg = { 
        Positive: ["#10b981", "#f0fdf4", "😊"], 
        Neutral: ["#f59e0b", "#fffbeb", "😐"], 
        Negative: ["#ef4444", "#fef2f2", "😞"] 
      };
      const [color, bg, emoji] = cfg[s] || cfg.Neutral;
      
      return (
        <span 
          style={{ background: bg, color, border: `1px solid ${color}33` }}
          className="text-[10px] font-bold px-2 py-0.5 rounded-full whitespace-nowrap"
        >
          {emoji} {s}
        </span>
      );
    }

    // ── Main App ──────────────────────────────────────────────────────────────────

    function App() {
      const [stage, setStage] = useState("upload"); // upload | processing | done
      const [conversations, setConversations] = useState([]);
      const [results, setResults] = useState([]);
      const [progress, setProgress] = useState(0);
      const [total, setTotal] = useState(0);
      
      // Filters
      const [search, setSearch] = useState("");
      const [filterCat, setFilterCat] = useState("All");
      const [filterSent, setFilterSent] = useState("All");
      
      const [expanded, setExpanded] = useState(null);
      const [error, setError] = useState("");
      
      const fileRef = useRef();
      const abortRef = useRef(false);

      const handleFiles = useCallback(async (files) => {
        setError("");
        try {
          let allRows = [];
          for (const f of files) {
            const rows = await parseCSV(f);
            allRows = allRows.concat(rows);
          }
          
          const convos = buildConversations(allRows);
          
          if (convos.length === 0) {
            setError("No valid conversations found. Make sure the CSV has 'Prospect Id' and 'Notes'.");
            return;
          }

          setConversations(convos);
          setTotal(convos.length);
          setResults([]);
          setProgress(0);
          setStage("processing");
          abortRef.current = false;

          const out = [];
          for (let i = 0; i < convos.length; i++) {
            if (abortRef.current) break;
            const conv = convos[i];
            
            const res = await classifyConversation(conv);
            out.push({ ...conv, ...res });
            
            setProgress(i + 1);
            setResults([...out]);
            
            // Gentle delay to respect API rate limits alongside exponential backoff
            if (i < convos.length - 1) await new Promise((r) => setTimeout(r, 400));
          }
          if (!abortRef.current) setStage("done");
          
        } catch (e) {
          setError("Failed to parse CSV: " + e.message);
        }
      }, []);

      const onDrop = useCallback((e) => {
        e.preventDefault();
        handleFiles([...e.dataTransfer.files].filter((f) => f.name.endsWith(".csv")));
      }, [handleFiles]);

      const exportCSV = () => {
        const headers = [
          "Prospect Id", "Student ID", "Name", "Email", "Phone", "Lead Stage", "Current Batch", 
          "Category", "Subcategory", "Sentiment", "Summary", "Message Count", 
          "QA Score", "QA Feedback", "Score: Accuracy", "Score: Resolution", "Score: Tone", 
          "Score: Listening", "Score: Speed", "Score: CRM", "Score: Formatting", "Score: Grammar", "Score: Closing"
        ];
        const rows = results.map((r) => {
          const s = r.scores || {};
          return [
            r.prospectId, r.studentId, r.name, r.email, r.phone, r.leadStage, r.currentBatch,
            r.category, r.subcategory, r.sentiment, `"${(r.summary || "").replace(/"/g, "'")}"`, r.messages.length,
            r.totalScore || 0, `"${(r.qaFeedback || "").replace(/"/g, "'")}"`,
            s.accuracy || 0, s.resolution || 0, s.tone || 0, s.listening || 0, s.speed || 0, s.crm || 0, s.formatting || 0, s.grammar || 0, s.closing || 0
          ];
        });
        const csv = [headers, ...rows].map((r) => r.join(",")).join("\n");
        const blob = new Blob([csv], { type: "text/csv" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a"); 
        a.href = url; 
        a.download = "whatsapp_categorized_chats.csv"; 
        a.click();
      };

      // Stats for Dashboard
      const catCounts = results.reduce((acc, r) => { acc[r.category] = (acc[r.category] || 0) + 1; return acc; }, {});
      const sentCounts = results.reduce((acc, r) => { acc[r.sentiment] = (acc[r.sentiment] || 0) + 1; return acc; }, {});
      const avgScore = results.length ? Math.round(results.reduce((acc, r) => acc + (r.totalScore || 0), 0) / results.length) : 0;

      const filtered = results.filter((r) => {
        const s = search.toLowerCase();
        const matchSearch = !s || r.name?.toLowerCase().includes(s) || r.studentId?.toLowerCase().includes(s) || r.summary?.toLowerCase().includes(s) || r.category?.toLowerCase().includes(s);
        const matchCat = filterCat === "All" || r.category === filterCat;
        const matchSent = filterSent === "All" || r.sentiment === filterSent;
        return matchSearch && matchCat && matchSent;
      });

      return (
        <div className="min-h-screen bg-slate-50 text-slate-800 font-sans selection:bg-blue-200">
          
          {/* ── Header ── */}
          <header className="bg-slate-900 px-6 py-4 flex items-center justify-between sticky top-0 z-10 shadow-md">
            <div className="flex items-center gap-3">
              <div className="w-9 h-9 bg-emerald-500 rounded-lg flex items-center justify-center text-xl shadow-lg shadow-emerald-500/20">💬</div>
              <div>
                <h1 className="text-white font-bold text-base tracking-tight leading-tight">WhatsApp Chat Bucketing</h1>
                <p className="text-slate-400 text-[11px] font-medium tracking-wide">Powered by Gemini AI · Zell Education</p>
              </div>
            </div>
            <div className="flex items-center gap-2">
              {stage === "done" && (
                <button 
                  onClick={exportCSV}
                  className="bg-white text-slate-900 hover:bg-slate-100 border-0 rounded-md px-4 py-2 text-xs font-semibold cursor-pointer flex items-center gap-2 transition-colors"
                >
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                  Export CSV
                </button>
              )}
              {stage !== "upload" && (
                <button 
                  onClick={() => { abortRef.current = true; setStage("upload"); setResults([]); }}
                  className="bg-slate-800 text-slate-300 hover:text-white border-0 rounded-md px-4 py-2 text-xs font-semibold cursor-pointer transition-colors"
                >
                  Reset
                </button>
              )}
            </div>
          </header>

          <main className="p-6 max-w-7xl mx-auto">
            
            {/* ── UPLOAD STAGE ── */}
            {stage === "upload" && (
              <div className="animate-in fade-in slide-in-from-bottom-4 duration-500">
                <div className="text-center mb-2 text-slate-500 text-sm font-medium">
                  Upload your raw WhatsApp chat exports from the CRM
                </div>
                
                <div
                  className="border-2 border-dashed border-slate-300 rounded-2xl p-16 text-center cursor-pointer transition-all duration-200 bg-white hover:bg-slate-50 hover:border-blue-400 mx-auto max-w-xl shadow-sm my-8 group"
                  onDragOver={(e) => e.preventDefault()}
                  onDrop={onDrop}
                  onClick={() => fileRef.current.click()}
                >
                  <div className="text-5xl mb-4 group-hover:scale-110 transition-transform">📂</div>
                  <h3 className="text-lg font-bold text-slate-800 mb-1">Drop your CSV files here</h3>
                  <p className="text-sm text-slate-400">or click to browse · Supports multiple files</p>
                  <input ref={fileRef} type="file" accept=".csv" multiple hidden onChange={(e) => handleFiles([...e.target.files])} />
                </div>
                
                {error && (
                  <div className="max-w-xl mx-auto mb-8 p-4 bg-red-50 text-red-600 rounded-lg text-sm font-medium border border-red-100 flex items-center gap-2">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
                    {error}
                  </div>
                )}

                {/* Taxonomy Preview */}
                <div className="max-w-4xl mx-auto mt-12">
                  <div className="font-bold text-xs mb-4 text-slate-400 tracking-widest uppercase">Classification Taxonomy Map</div>
                  <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                    {Object.entries(TAXONOMY).map(([cat, subs]) => (
                      <div key={cat} className="bg-white rounded-xl p-4 shadow-sm border border-slate-100" style={{ borderLeft: `4px solid ${CATEGORY_COLORS[cat]}` }}>
                        <div className="font-bold text-[13px] mb-2" style={{ color: CATEGORY_COLORS[cat] }}>{cat}</div>
                        <ul className="space-y-1">
                          {subs.map((sub) => (
                            <li key={sub} className="text-[11px] text-slate-500 flex items-start gap-1.5">
                              <span className="text-slate-300 mt-0.5">•</span> 
                              <span>{sub}</span>
                            </li>
                          ))}
                        </ul>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}

            {/* ── PROCESSING STAGE ── */}
            {stage === "processing" && (
              <div className="max-w-2xl mx-auto mt-16 text-center animate-in fade-in duration-500">
                <div className="text-5xl mb-4 animate-bounce">✨</div>
                <h2 className="text-2xl font-bold mb-2">Gemini is Classifying Conversations</h2>
                <p className="text-sm text-slate-500 mb-8">Reading context, determining sentiment, and assigning categories...</p>
                
                <div className="bg-slate-200 rounded-full h-2.5 mb-3 overflow-hidden">
                  <div 
                    className="h-full rounded-full transition-all duration-300 ease-out"
                    style={{
                      width: `${total ? (progress / total) * 100 : 0}%`,
                      backgroundImage: "linear-gradient(90deg, #3b82f6, #8b5cf6)"
                    }} 
                  />
                </div>
                
                <div className="text-sm font-medium text-slate-500 flex items-center justify-between px-1">
                  <span>{Math.round((progress/total)*100 || 0)}% Complete</span>
                  <span>{progress} of {total} processed</span>
                </div>

                {results.length > 0 && (
                  <div className="mt-12 text-left">
                    <div className="font-bold text-xs text-slate-400 mb-3 tracking-wider">LATEST PROCESSED</div>
                    <div className="space-y-2">
                      {results.slice(-4).reverse().map((r, i) => (
                        <div key={i} className="bg-white p-3 rounded-lg shadow-sm border border-slate-100 flex items-center gap-3 animate-in slide-in-from-right-4 fade-in">
                          <span 
                            className="text-[10px] font-bold px-2 py-0.5 rounded-full border whitespace-nowrap"
                            style={{ background: CATEGORY_BG[r.category] || "#f1f5f9", color: CATEGORY_COLORS[r.category] || "#64748b", borderColor: `${CATEGORY_COLORS[r.category]}33` || "#e2e8f0" }}
                          >
                            {r.category}
                          </span>
                          <span className="text-xs font-medium text-slate-700 flex-1 truncate">{r.name}</span>
                          <span className="text-[10px] bg-slate-100 text-slate-500 px-2 py-0.5 rounded-full whitespace-nowrap">{r.subcategory}</span>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
              </div>
            )}

            {/* ── DASHBOARD STAGE ── */}
            {stage === "done" && (
              <div className="animate-in fade-in duration-500">
                
                {/* KPI Cards */}
                <div className="grid grid-cols-2 md:grid-cols-5 gap-4 mb-6">
                  {[
                    { label: "Total Classified", value: results.length, icon: "💬", color: "border-slate-200" },
                    { label: "Avg QA Score", value: `${avgScore}%`, icon: "🎯", color: "border-purple-400", valColor: avgScore >= 80 ? "text-purple-600" : "text-orange-500" },
                    { label: "Needs Attention (Negative)", value: sentCounts.Negative || 0, icon: "⚠️", color: "border-red-400", valColor: "text-red-500" },
                    { label: "Positive Feedback", value: sentCounts.Positive || 0, icon: "✅", color: "border-emerald-400", valColor: "text-emerald-500" },
                    { label: "Active Categories", value: Object.keys(catCounts).length, icon: "🗂️", color: "border-blue-400" },
                  ].map((stat) => (
                    <div key={stat.label} className={`bg-white rounded-xl p-5 shadow-sm border border-slate-100 border-b-4 ${stat.color}`}>
                      <div className="text-2xl mb-1">{stat.icon}</div>
                      <div className={`text-3xl font-extrabold ${stat.valColor || "text-slate-800"}`}>{stat.value}</div>
                      <div className="text-xs text-slate-400 font-medium mt-1">{stat.label}</div>
                    </div>
                  ))}
                </div>

                {/* Charts */}
                <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
                  <div className="bg-white rounded-xl shadow-sm border border-slate-100 p-6 flex flex-col items-center justify-center">
                    <div className="font-bold text-xs mb-4 text-slate-400 tracking-wider w-full text-center">OVERALL BREAKDOWN</div>
                    <DonutChart data={catCounts} total={results.length} />
                    <div className="mt-6 w-full space-y-2">
                      {Object.entries(catCounts).sort(([,a],[,b])=>b-a).slice(0, 5).map(([cat, cnt]) => (
                        <div key={cat} className="flex items-center gap-2">
                          <div className="w-2.5 h-2.5 rounded-sm shrink-0" style={{ background: CATEGORY_COLORS[cat] }} />
                          <div className="text-[11px] text-slate-500 flex-1 truncate">{cat}</div>
                          <div className="text-[11px] font-bold text-slate-800">{cnt}</div>
                        </div>
                      ))}
                    </div>
                  </div>
                  <div className="bg-white rounded-xl shadow-sm border border-slate-100 p-6 md:col-span-2">
                    <div className="font-bold text-xs mb-5 text-slate-400 tracking-wider">DISTRIBUTION BY CATEGORY</div>
                    <MiniBar data={catCounts} total={results.length} />
                  </div>
                </div>

                {/* Table Filters */}
                <div className="flex flex-wrap gap-3 mb-4 items-center bg-white p-2 border border-slate-200 rounded-lg shadow-sm">
                  <div className="relative flex-1 min-w-[200px]">
                    <span className="absolute left-3 top-2.5 text-slate-400 text-sm">🔍</span>
                    <input
                      value={search}
                      onChange={(e) => setSearch(e.target.value)}
                      placeholder="Search name, ID, summary..."
                      className="w-full pl-9 pr-3 py-2 bg-slate-50 border-transparent rounded-md text-sm focus:bg-white focus:border-blue-400 focus:ring-2 focus:ring-blue-100 outline-none transition-all"
                    />
                  </div>
                  <select 
                    value={filterCat} onChange={(e) => setFilterCat(e.target.value)}
                    className="py-2 px-3 bg-slate-50 border border-slate-200 rounded-md text-sm text-slate-700 outline-none focus:border-blue-400 cursor-pointer"
                  >
                    <option value="All">All Categories</option>
                    {Object.keys(TAXONOMY).map((c) => <option key={c}>{c}</option>)}
                  </select>
                  <select 
                    value={filterSent} onChange={(e) => setFilterSent(e.target.value)}
                    className="py-2 px-3 bg-slate-50 border border-slate-200 rounded-md text-sm text-slate-700 outline-none focus:border-blue-400 cursor-pointer"
                  >
                    <option value="All">All Sentiments</option>
                    <option>Positive</option><option>Neutral</option><option>Negative</option>
                  </select>
                  <div className="text-xs font-medium text-slate-400 px-2">
                    Showing {filtered.length} of {results.length}
                  </div>
                </div>

                {/* Main Table View */}
                <div className="bg-white border border-slate-200 rounded-xl shadow-sm overflow-hidden">
                  <div className="grid grid-cols-12 gap-4 px-5 py-3 bg-slate-50 border-b border-slate-200 text-xs font-bold text-slate-500 tracking-wider">
                    <div className="col-span-3">STUDENT DETAILS</div>
                    <div className="col-span-3">ISSUE SUMMARY</div>
                    <div className="col-span-2">CATEGORY</div>
                    <div className="col-span-2">SUBCATEGORY</div>
                    <div className="col-span-1 text-center">FEEL</div>
                    <div className="col-span-1 text-center">QA</div>
                  </div>
                  
                  {filtered.length === 0 ? (
                    <div className="p-12 text-center text-slate-400 text-sm">No conversations match your filters.</div>
                  ) : (
                    <div className="divide-y divide-slate-100 max-h-[600px] overflow-y-auto">
                      {filtered.map((r, i) => (
                        <div key={r.prospectId + i} className="group">
                          <div
                            className={`grid grid-cols-12 gap-4 px-5 py-3 items-center cursor-pointer transition-colors ${i % 2 === 0 ? "bg-white" : "bg-slate-50/50"} hover:bg-blue-50/50`}
                            onClick={() => setExpanded(expanded === i ? null : i)}
                          >
                            <div className="col-span-3">
                              <div className="font-semibold text-sm text-slate-800 truncate">{r.name}</div>
                              <div className="text-[10px] text-slate-400 mt-0.5 truncate">
                                {r.studentId && <span className="text-slate-500">#{r.studentId} · </span>}
                                {r.messages.length} msgs
                                {r.currentBatch && ` · ${r.currentBatch}`}
                              </div>
                            </div>
                            <div className="col-span-3 text-xs text-slate-600 leading-snug pr-4">{r.summary}</div>
                            <div className="col-span-2">
                              <span 
                                className="text-[10px] font-bold px-2.5 py-1 rounded-full border inline-block whitespace-nowrap overflow-hidden text-ellipsis max-w-full"
                                style={{ background: CATEGORY_BG[r.category] || "#f1f5f9", color: CATEGORY_COLORS[r.category] || "#64748b", borderColor: `${CATEGORY_COLORS[r.category]}33` || "#e2e8f0" }}
                              >
                                {r.category}
                              </span>
                            </div>
                            <div className="col-span-2">
                              <span className="text-[10px] bg-slate-100 text-slate-600 px-2 py-1 rounded-md inline-block whitespace-nowrap overflow-hidden text-ellipsis max-w-full">
                                {r.subcategory}
                              </span>
                            </div>
                            <div className="col-span-1 text-center">
                              <SentimentBadge s={r.sentiment} />
                            </div>
                            <div className="col-span-1 text-center">
                              <div className={`text-xs font-bold ${r.totalScore >= 80 ? 'text-emerald-600' : r.totalScore >= 60 ? 'text-orange-500' : 'text-red-600'}`}>
                                {r.totalScore || 0}
                              </div>
                            </div>
                          </div>

                          {/* Expanded View for Conversation Thread */}
                          {expanded === i && (
                            <div className="px-5 py-4 bg-slate-800 text-slate-300 shadow-inner grid grid-cols-1 lg:grid-cols-3 gap-6">
                              
                              {/* Left: Chat Thread */}
                              <div className="lg:col-span-2">
                                <div className="flex items-center justify-between mb-3">
                                  <div className="font-bold text-xs text-slate-400 tracking-wider">CONVERSATION THREAD</div>
                                  <div className="text-[10px] text-slate-500 font-mono">{r.prospectId}</div>
                                </div>
                                <div className="max-h-[300px] overflow-y-auto pr-2 space-y-3 custom-scrollbar">
                                  {r.messages.map((m, mi) => (
                                    <div 
                                      key={mi} 
                                      className={`flex flex-col max-w-[85%] ${m.direction?.toLowerCase() === "outbound" ? "ml-auto items-end" : "mr-auto items-start"}`}
                                    >
                                      <div 
                                        className={`p-3 text-xs leading-relaxed ${
                                          m.direction?.toLowerCase() === "outbound" 
                                            ? "bg-blue-600 text-white rounded-2xl rounded-tr-sm" 
                                            : "bg-slate-700 text-slate-200 rounded-2xl rounded-tl-sm"
                                        }`}
                                      >
                                        {m.note}
                                      </div>
                                      <div className="text-[9px] text-slate-500 mt-1 px-1 font-medium">
                                        {m.direction} • {new Date(m.date).toLocaleString([], { dateStyle: 'short', timeStyle: 'short' })}
                                      </div>
                                    </div>
                                  ))}
                                </div>
                              </div>

                              {/* Right: QA Scorecard */}
                              <div className="bg-slate-900 rounded-xl p-4 border border-slate-700 h-fit max-h-[300px] overflow-y-auto custom-scrollbar">
                                <div className="flex justify-between items-center mb-4 pb-3 border-b border-slate-700">
                                  <div className="font-bold text-xs text-slate-400 tracking-wider">QA SCORECARD</div>
                                  <div className={`text-lg font-black ${r.totalScore >= 80 ? 'text-emerald-400' : r.totalScore >= 60 ? 'text-orange-400' : 'text-red-400'}`}>
                                    {r.totalScore || 0}<span className="text-xs text-slate-500">/100</span>
                                  </div>
                                </div>
                                
                                <div className="space-y-3 mb-4">
                                  {[
                                    { group: "Resolution & Accuracy (40)", items: [
                                      { k: "Accuracy", v: r.scores?.accuracy, max: 20 },
                                      { k: "Resolution", v: r.scores?.resolution, max: 20 }
                                    ]},
                                    { group: "Empathy & Tone (25)", items: [
                                      { k: "Tone", v: r.scores?.tone, max: 15 },
                                      { k: "Listening", v: r.scores?.listening, max: 10 }
                                    ]},
                                    { group: "Process (20)", items: [
                                      { k: "Speed (TAT)", v: r.scores?.speed, max: 10 },
                                      { k: "CRM/Auth", v: r.scores?.crm, max: 10 }
                                    ]},
                                    { group: "Communication (15)", items: [
                                      { k: "Format", v: r.scores?.formatting, max: 5 },
                                      { k: "Grammar", v: r.scores?.grammar, max: 5 },
                                      { k: "Closing", v: r.scores?.closing, max: 5 }
                                    ]}
                                  ].map((g, gi) => (
                                    <div key={gi}>
                                      <div className="text-[10px] font-bold text-slate-500 mb-1.5 uppercase tracking-wider">{g.group}</div>
                                      {g.items.map(item => (
                                        <div key={item.k} className="flex justify-between items-center text-xs mb-1">
                                          <span className="text-slate-300">{item.k}</span>
                                          <span className="font-mono text-slate-400"><span className={item.v === item.max ? "text-emerald-400" : item.v === 0 ? "text-red-400" : "text-orange-400"}>{item.v || 0}</span>/{item.max}</span>
                                        </div>
                                      ))}
                                    </div>
                                  ))}
                                </div>
                                
                                <div className="bg-slate-800 rounded p-3 text-xs text-slate-300 italic border-l-2 border-blue-500">
                                  "{r.qaFeedback}"
                                </div>
                              </div>

                            </div>
                          )}
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              </div>
            )}
          </main>

          {/* Global styles for custom scrollbar in dark mode */}
          <style dangerouslySetInnerHTML={{__html: `
            .custom-scrollbar::-webkit-scrollbar { width: 6px; }
            .custom-scrollbar::-webkit-scrollbar-track { background: rgba(15, 23, 42, 1); border-radius: 4px; }
            .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(51, 65, 85, 1); border-radius: 4px; }
            .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(71, 85, 105, 1); }
          `}} />
        </div>
      );
    }

    // Render the App
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
